name: Release Draft

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name for the draft release (example: v0.9.0)"
        required: true
        type: string
      ref:
        description: Git ref to build (branch, tag, or commit SHA)
        required: false
        default: main
        type: string

permissions:
  contents: write

jobs:
  build-release-assets:
    name: Release build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            platform: linux
            arch: x86_64
            triplet: arch-env
          - name: linux-i686
            os: ubuntu-22.04
            platform: linux
            arch: i686
            triplet: arch-env
          - name: linux-armv7l
            os: ubuntu-22.04
            platform: linux
            arch: armv7l
            triplet: arch-env
          - name: linux-aarch64
            os: ubuntu-22.04
            platform: linux
            arch: aarch64
            triplet: arch-env
          - name: windows-x64
            os: windows-2022
            platform: windows
            arch: x64
            msvc_arch: x64
            triplet: x64-windows-static
          - name: windows-x86
            os: windows-2022
            platform: windows
            arch: x86
            msvc_arch: x86
            triplet: x86-windows-static
          - name: windows-arm64ec
            os: windows-2022
            platform: windows
            arch: arm64ec
            msvc_arch: amd64_arm64
            triplet: arm64ec-windows-static
          - name: macos-x86_64
            os: macos-13
            platform: macos
            arch: x86_64
            triplet: arch-env
          - name: macos-i386
            os: macos-13
            platform: macos
            arch: i386
            triplet: arch-env
            allow_failure: true
          - name: macos-arm64
            os: macos-14
            platform: macos
            arch: arm64
            triplet: arch-env
    env:
      ARCH: ${{ matrix.arch }}
      VCPKG_OVERLAY_TRIPLETS: cmake/vcpkg-triplets

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve vcpkg toolchain (Unix)
        if: runner.os != 'Windows'
        id: vcpkg-unix
        shell: bash
        run: |
          set -euo pipefail
          candidates=()
          if [ -n "${VCPKG_INSTALLATION_ROOT:-}" ]; then
            candidates+=("${VCPKG_INSTALLATION_ROOT}/scripts/buildsystems/vcpkg.cmake")
          fi
          candidates+=("$HOME/vcpkg/scripts/buildsystems/vcpkg.cmake")

          for candidate in "${candidates[@]}"; do
            if [ -f "$candidate" ]; then
              echo "toolchain=$candidate" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "Unable to locate vcpkg toolchain file on runner." >&2
          exit 1

      - name: Resolve vcpkg toolchain (Windows)
        if: runner.os == 'Windows'
        id: vcpkg-windows
        shell: pwsh
        run: |
          $candidates = @()
          if ($env:VCPKG_INSTALLATION_ROOT) {
            $candidates += (Join-Path $env:VCPKG_INSTALLATION_ROOT 'scripts/buildsystems/vcpkg.cmake')
          }
          $candidates += 'C:\vcpkg\scripts\buildsystems\vcpkg.cmake'

          foreach ($candidate in $candidates) {
            if (Test-Path $candidate) {
              "toolchain=$candidate" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
              exit 0
            }
          }

          throw 'Unable to locate vcpkg toolchain file on runner.'

      - name: Cache vcpkg and CMake deps
        uses: actions/cache@v4
        with:
          path: |
            build/vcpkg_installed
            build/_deps
          key: >-
            release-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'cmake/vcpkg-triplets/*.cmake', 'vcpkg.json') }}

      - name: Setup Linux cross dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo sed -i '/arch=/! s/^deb/deb [arch=amd64,i386]/' /etc/apt/sources.list
          awk '
          $3 !~ /ubuntu\.com/ { next }
          $1 == "deb" {
            $2 = "[arch=armhf,arm64]";
            $3 = "http://ports.ubuntu.com/ubuntu-ports/"
          } 1' /etc/apt/sources.list | sudo tee /etc/apt/sources.list.d/ports.list > /dev/null

          install_deps() {
            local target_arch="$1"; shift
            local native=("$@" php-cli qemu-user-binfmt)
            local target=(
              libboost-dev libcurl4-openssl-dev libsqlite3-dev libssl-dev
              libxml2-dev zlib1g-dev
            )

            sudo dpkg --add-architecture "$target_arch"
            sudo apt-get update -qq
            sudo apt-get install -y -qq aptitude > /dev/null
            sudo aptitude install -yR "${native[@]}" "${target[@]/%/:$target_arch}" > /dev/null
            sudo aptitude install -yR "${native[@]}" > /dev/null
          }

          case "$ARCH" in
            x86_64)
              install_deps amd64
              ;;
            i686)
              install_deps i386 g++-multilib
              {
                echo "TOOLCHAIN=${GITHUB_WORKSPACE}/cmake/linux-cross.cmake"
                echo "TOOLCHAIN_PREFIX=i386-linux-gnu"
              } >> "$GITHUB_ENV"
              ;;
            armv7l)
              install_deps armhf g++-arm-linux-gnueabihf
              {
                echo "TOOLCHAIN=${GITHUB_WORKSPACE}/cmake/linux-cross.cmake"
                echo "TOOLCHAIN_PREFIX=arm-linux-gnueabihf"
              } >> "$GITHUB_ENV"
              ;;
            aarch64)
              install_deps arm64 g++-aarch64-linux-gnu
              {
                echo "TOOLCHAIN=${GITHUB_WORKSPACE}/cmake/linux-cross.cmake"
                echo "TOOLCHAIN_PREFIX=aarch64-linux-gnu"
              } >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported ARCH: $ARCH" >&2
              exit 1
              ;;
          esac

      - name: Setup macOS build environment
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail

          if [ "$ARCH" = "arm64" ]; then
            echo "DEPLOY_TARGET=11.0" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_TARGET=10.9" >> "$GITHUB_ENV"
            echo "SDKROOT=/Library/Developer/CommandLineTools/SDKs/MacOSX10.10.sdk" >> "$GITHUB_ENV"
            if [ ! -d /Library/Developer/CommandLineTools/SDKs/MacOSX10.10.sdk ]; then
              curl -fsSLO https://github.com/phracker/MacOSX-SDKs/releases/download/10.15/MacOSX10.10.sdk.tar.xz
              echo "608a89db8b4be150a945871230b5ba5d4767a8500bc5fe76ddf10f5cec5ef513 MacOSX10.10.sdk.tar.xz" | shasum -a 256 -c
              sudo tar xf MacOSX10.10.sdk.tar.xz -C /Library/Developer/CommandLineTools/SDKs
            fi
          fi

          if [ -d /Library/Frameworks/Mono.framework ]; then
            sudo rm -rf /Library/Frameworks/Mono.framework
          fi

      - name: Setup MSVC developer command prompt
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Setup ARM64EC flags
        if: matrix.platform == 'windows' && matrix.arch == 'arm64ec'
        shell: pwsh
        run: |
          'CFLAGS=-arm64EC' | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          'CXXFLAGS=-arm64EC' | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        env:
          VCPKG_TOOLCHAIN: ${{ steps.vcpkg-unix.outputs.toolchain }}
        shell: bash
        run: |
          set -euo pipefail
          cmake_args=(
            -B build
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_TOOLCHAIN"
            -DVCPKG_TARGET_TRIPLET="${{ matrix.triplet }}"
            -DCMAKE_OSX_ARCHITECTURES="$ARCH"
          )

          if [ -n "${DEPLOY_TARGET:-}" ]; then
            cmake_args+=("-DCMAKE_OSX_DEPLOYMENT_TARGET=${DEPLOY_TARGET}")
          fi

          if [ -n "${TOOLCHAIN:-}" ]; then
            cmake_args+=("-DVCPKG_CHAINLOAD_TOOLCHAIN_FILE=${TOOLCHAIN}")
          fi

          cmake "${cmake_args[@]}"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        env:
          VCPKG_TOOLCHAIN: ${{ steps.vcpkg-windows.outputs.toolchain }}
        shell: pwsh
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_TOOLCHAIN" `
            -DVCPKG_TARGET_TRIPLET="${{ matrix.triplet }}"

      - name: Build
        run: cmake --build build

      - name: Upload Linux artifacts
        if: always() && matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: build/reaper_*.so

      - name: Upload macOS artifacts
        if: always() && matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: build/reaper_*.dylib

      - name: Upload Windows artifacts
        if: always() && matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: |
            build/reaper_*.dll
            build/reaper_*.pdb

  create-draft-release:
    name: Create draft release
    runs-on: ubuntu-latest
    needs:
      - build-release-assets
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-artifacts

      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ inputs.ref }}
          draft: true
          prerelease: false
          generate_release_notes: false
          files: |
            release-artifacts/reaper_*.dll
            release-artifacts/reaper_*.pdb
            release-artifacts/reaper_*.so
            release-artifacts/reaper_*.dylib
          fail_on_unmatched_files: false
          overwrite_files: true
