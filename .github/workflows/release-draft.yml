name: Release Draft

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  prepare-release:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      released: ${{ steps.tag.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          npx
          --package semantic-release@24
          --package @semantic-release/commit-analyzer@13
          --package @semantic-release/release-notes-generator@14
          --package @semantic-release/github@11
          semantic-release

      - name: Capture release tag
        id: tag
        run: |
          tag=$(git tag --points-at HEAD | grep '^v' | head -1)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "released=$([[ -n $tag ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  build-release-assets:
    needs: prepare-release
    if: needs.prepare-release.outputs.released == 'true'
    uses: ./.github/workflows/build-matrix.yml
    with:
      checkout_ref: ${{ needs.prepare-release.outputs.tag }}
      build_type: Release
      windows_preset: windows-msvc-ninja-release
      windows_artifact_dir: build/windows-msvc-ninja-release
      run_tests: true
      include_clang_tidy_linux: true
      artifact_prefix: release
      cache_key_prefix: release-

  upload-artifacts:
    name: Upload artifacts to draft release
    runs-on: ubuntu-latest
    needs: [prepare-release, build-release-assets]
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-artifacts

      - name: Upload artifacts to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          draft: true
          generate_release_notes: false
          files: |
            release-artifacts/reaper_*.dll
            release-artifacts/reaper_*.pdb
            release-artifacts/reaper_*.so
            release-artifacts/reaper_*.dylib
          fail_on_unmatched_files: false
          overwrite_files: true
